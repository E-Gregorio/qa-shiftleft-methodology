name: Deploy QA Shift-Left Methodology to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site (HTML deliverables)
        run: |
          mkdir -p _site
          cp informesFormatoHtml/setup_QA_ShiftleftTesting.html _site/index.html
          cp -r informesFormatoHtml/* _site/
          cp -r Command_Center_Shift-Left-Testing _site/command-center
          cp README.md _site/
          cp CONTRIBUTING.md _site/
          cp LICENSE _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
